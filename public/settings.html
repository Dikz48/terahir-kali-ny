<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - DIKZ AI</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <style>
    @media (max-width: 768px) {
      .settings-container { padding: 15px; }
      .settings-card { margin-bottom: 15px; }
    }
  </style>
</head>
<body>
  <div id="app" class="page-wrapper">
    <div class="page-sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-logo">DIKZ</a>
        <button onclick="closeSidebar()" class="btn-icon-mini">✕</button>
      </div>
      
      <div class="sidebar-nav">
        <a href="/" class="nav-item">🏠 Home</a>
        <a href="/chat" class="nav-item">💬 Chat</a>
        <a href="/history" class="nav-item">📜 History</a>
        <a href="/settings" class="nav-item active">⚙️ Settings</a>
      </div>
      
      <div class="sidebar-footer">
        <p class="text-xs text-gray-500">v1.0</p>
      </div>
    </div>

    <div class="page-overlay" onclick="closeSidebar()"></div>

    <div class="page-main">
      <div class="page-header">
        <button onclick="toggleSidebar()" class="btn-menu">☰</button>
        <h1 class="page-title">Settings</h1>
      </div>

      <div class="page-content">
        <div class="settings-container">
          <div class="settings-card">
            <h3 class="settings-title">Theme</h3>
            <select id="themeSelect" onchange="changeTheme(this.value)" class="settings-input">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </div>

          <div class="settings-card">
            <h3 class="settings-title">Temperature</h3>
            <input type="range" id="temperatureSlider" min="0" max="1" step="0.1" value="0.7" onchange="changeTemperature(this.value)" class="settings-input">
            <div class="settings-value"><span id="tempValue">0.7</span></div>
          </div>

          <div class="settings-card">
            <h3 class="settings-title">Max Tokens</h3>
            <input type="number" id="maxTokens" min="100" max="4000" value="2000" onchange="changeMaxTokens(this.value)" class="settings-input">
          </div>

          <div class="settings-card">
            <h3 class="settings-title">Model</h3>
            <select id="modelSelect" onchange="changeModel(this.value)" class="settings-input">
              <option value="Qwen/Qwen2.5-7B-Instruct">Qwen 2.5 7B</option>
              <option value="Mistral-7B-Instruct">Mistral 7B</option>
            </select>
          </div>

          <div class="settings-card">
            <h3 class="settings-title">Export & Import</h3>
            <button onclick="exportSettings()" class="btn-secondary">📥 Export Settings</button>
            <button onclick="importSettings()" class="btn-secondary">📤 Import Settings</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
